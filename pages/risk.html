<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Risk Disclaimer — CryptoVault</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,700;1,400&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#fafaf8;--bg-2:#f4f3ef;--bg-3:#eeecea;--card:#ffffff;--border:#e8e5df;--border-2:#d4cfc7;--ink:#1a1814;--ink-2:#2d2a25;--ink-3:#4a453e;--muted:#7a7468;--muted-2:#a09890;--gold:#b8860b;--gold-2:#d4a017;--gold-bg:rgba(184,134,11,0.08);--gold-border:rgba(184,134,11,0.25);--green:#16a34a;--red:#dc2626;--red-bg:rgba(220,38,38,0.06);--red-border:rgba(220,38,38,0.2);--shadow-sm:0 1px 3px rgba(26,24,20,0.06);--shadow-md:0 4px 16px rgba(26,24,20,0.08);--nav-bg:rgba(250,250,248,0.94);--r:6px;--r2:12px;--r3:20px}
[data-theme="dark"]{--bg:#0e0d0b;--bg-2:#141310;--bg-3:#1c1a16;--card:#1a1814;--border:rgba(255,255,255,0.08);--border-2:rgba(255,255,255,0.14);--ink:#f5f2ec;--ink-2:#e0dbd2;--ink-3:#b8b0a4;--muted:#7a7468;--muted-2:#4a453e;--gold:#c9a84c;--gold-2:#e0be6a;--gold-bg:rgba(201,168,76,0.08);--gold-border:rgba(201,168,76,0.25);--red:#ef4444;--red-bg:rgba(239,68,68,0.06);--red-border:rgba(239,68,68,0.2);--shadow-sm:0 1px 3px rgba(0,0,0,0.3);--nav-bg:rgba(14,13,11,0.94)}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--ink);line-height:1.6;-webkit-font-smoothing:antialiased;transition:background .35s,color .35s}
a{text-decoration:none;color:inherit}
.display{font-family:'Playfair Display',serif;line-height:1.08;letter-spacing:-.02em}
.container{max-width:1180px;margin:0 auto;padding:0 40px}
@media(max-width:768px){.container{padding:0 20px}}
#navbar{position:fixed;top:0;left:0;right:0;z-index:999;padding:18px 0;background:#0e0d0b;border-bottom:1px solid rgba(255,255,255,0.08);box-shadow:0 2px 16px rgba(0,0,0,0.3)}
.nav-inner{display:flex;align-items:center}
.logo{display:flex;align-items:center;gap:14px;flex-shrink:0}
.brand-logo{height:46px;width:auto;object-fit:contain;display:block}
.logo-name{font-family:'Playfair Display',serif;font-size:22px;font-weight:600;letter-spacing:1px;background:linear-gradient(135deg,#f5f2ec,#c9a84c);-webkit-background-clip:text;-webkit-text-fill-color:transparent;display:inline-block}
.logo-name span{background:linear-gradient(135deg,#c9a84c,#e0be6a);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.nav-center{flex:1;display:flex;justify-content:center}
.nav-links{display:flex;align-items:center;gap:2px}
.nav-links a{font-size:14px;color:var(--muted);padding:8px 14px;border-radius:var(--r);transition:color .2s}
.nav-links a:hover{color:var(--ink)}
.nav-right{display:flex;align-items:center;gap:10px}
.btn{display:inline-flex;align-items:center;gap:8px;font-family:'Outfit',sans-serif;font-weight:500;cursor:pointer;transition:all .22s;border-radius:var(--r2);border:none;white-space:nowrap;text-decoration:none}
.btn-gold{background:linear-gradient(135deg,var(--gold),var(--gold-2));color:#fff;padding:9px 20px;font-size:13px;font-weight:600}
.btn-gold:hover{transform:translateY(-1px)}
.btn-outline{background:transparent;color:var(--ink);border:1.5px solid var(--border-2);padding:9px 20px;font-size:13px}
.btn-outline:hover{border-color:var(--gold);color:var(--gold)}
.hamburger{display:none;flex-direction:column;gap:5px;cursor:pointer;background:none;border:none;padding:6px;margin-left:8px}
.hamburger span{display:block;width:22px;height:2px;background:#fff;border-radius:2px;transition:all .3s}
.hamburger.open span:nth-child(1){transform:translateY(7px) rotate(45deg)}
.hamburger.open span:nth-child(2){opacity:0}
.hamburger.open span:nth-child(3){transform:translateY(-7px) rotate(-45deg)}
.mobile-menu{display:none;position:fixed;top:65px;left:0;right:0;bottom:0;background:var(--bg);z-index:998;padding:24px;flex-direction:column;border-top:1px solid var(--border);transform:translateX(100%);transition:transform .3s ease}
.mobile-menu.open{transform:translateX(0)}
.mobile-menu a{display:block;padding:14px 0;font-size:17px;color:var(--ink);border-bottom:1px solid var(--border)}
.mob-actions{margin-top:28px;display:flex;flex-direction:column;gap:12px}
@media(max-width:900px){.nav-center{display:none}.hamburger{display:flex}.mobile-menu{display:flex}.nav-right .btn-outline,.nav-right .btn-gold{display:none}}
.page-wrap{display:grid;grid-template-columns:260px 1fr;gap:60px;padding-top:120px;padding-bottom:100px;align-items:start}
@media(max-width:900px){.page-wrap{grid-template-columns:1fr;padding-top:100px}}
.toc{position:sticky;top:100px}
.toc-title{font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--gold);margin-bottom:16px}
.toc-list{list-style:none;display:flex;flex-direction:column;gap:2px}
.toc-list a{font-size:13px;color:var(--muted);padding:6px 10px;border-radius:var(--r);display:block;transition:all .2s;border-left:2px solid transparent}
.toc-list a:hover{color:var(--ink);background:var(--bg-2);border-left-color:var(--gold)}
.toc-list a.active{color:var(--gold);background:var(--gold-bg);border-left-color:var(--gold);font-weight:500}
@media(max-width:900px){.toc{display:none}}
.legal-header{margin-bottom:48px;padding-bottom:32px;border-bottom:1px solid var(--border)}
.legal-header h1{font-size:clamp(36px,4vw,52px);margin-bottom:12px;color:var(--ink)}
.legal-header .meta{font-size:13px;color:var(--muted);display:flex;gap:20px;flex-wrap:wrap}
.risk-alert{background:var(--red-bg);border:1px solid var(--red-border);border-radius:var(--r2);padding:20px 24px;margin-top:20px;display:flex;gap:14px;align-items:flex-start}
.risk-alert-icon{font-size:22px;flex-shrink:0;margin-top:2px}
.risk-alert h4{font-size:14px;font-weight:700;color:var(--red);margin-bottom:6px}
.risk-alert p{font-size:13px;color:var(--ink-3);line-height:1.7}
.legal-section{margin-bottom:48px;padding-bottom:48px;border-bottom:1px solid var(--border);scroll-margin-top:100px}
.legal-section:last-child{border-bottom:none;margin-bottom:0}
.legal-section h2{font-family:'Playfair Display',serif;font-size:24px;font-weight:400;color:var(--ink);margin-bottom:16px;display:flex;align-items:center;gap:10px}
.legal-section h2 .sec-num{font-size:11px;font-weight:700;letter-spacing:.1em;color:var(--gold);background:var(--gold-bg);border:1px solid var(--gold-border);padding:3px 8px;border-radius:4px;font-family:'Outfit',sans-serif}
.legal-section h3{font-size:16px;font-weight:600;color:var(--ink);margin:20px 0 10px}
.legal-section p{font-size:14px;color:var(--ink-3);line-height:1.8;margin-bottom:12px}
.legal-section p:last-child{margin-bottom:0}
.legal-section ul{padding-left:20px;margin-bottom:12px;display:flex;flex-direction:column;gap:8px}
.legal-section li{font-size:14px;color:var(--ink-3);line-height:1.7}
.legal-section a{color:var(--gold)}
.info-box{background:var(--gold-bg);border:1px solid var(--gold-border);border-radius:var(--r2);padding:16px 20px;margin:20px 0;font-size:13px;color:var(--ink-3);line-height:1.7}
/* Risk category cards */
.risk-cards{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin:24px 0}
@media(max-width:600px){.risk-cards{grid-template-columns:1fr}}
.risk-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r2);padding:20px;box-shadow:var(--shadow-sm)}
.risk-card-icon{font-size:24px;margin-bottom:10px}
.risk-card h4{font-size:14px;font-weight:600;color:var(--ink);margin-bottom:6px}
.risk-card p{font-size:13px;color:var(--muted);line-height:1.6}
.risk-level{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:600;padding:3px 8px;border-radius:4px;margin-bottom:8px}
.risk-high{background:var(--red-bg);color:var(--red);border:1px solid var(--red-border)}
.risk-med{background:rgba(245,158,11,.08);color:#d97706;border:1px solid rgba(245,158,11,.2)}
.risk-low{background:var(--gold-bg);color:var(--gold);border:1px solid var(--gold-border)}
/* CTA section */
.risk-cta{background:linear-gradient(135deg,var(--bg-2),var(--bg-3));border:1px solid var(--border);border-radius:var(--r3);padding:40px;text-align:center;margin-top:48px}
.risk-cta h3{font-family:'Playfair Display',serif;font-size:26px;font-weight:400;color:var(--ink);margin-bottom:10px}
.risk-cta p{font-size:14px;color:var(--muted);margin-bottom:24px}
.risk-cta-actions{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
footer{background:var(--bg-2);border-top:1px solid var(--border);padding:40px 0 24px}
.footer-bottom{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;font-size:12px;color:var(--muted-2)}
.footer-links{display:flex;gap:16px}
.footer-links a{font-size:12px;color:var(--muted);transition:color .2s}
.footer-links a:hover{color:var(--ink)}
</style>
</head>

.btn-ng:hover{border-color:rgba(255,255,255,0.55);color:#fff}
.btn-go{background:linear-gradient(135deg,#b8860b,#d4a017);color:#fff;border:none;padding:9px 20px;border-radius:10px;font-family:'Outfit',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;text-decoration:none;display:inline-flex;align-items:center;gap:6px}
.btn-go:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(184,134,11,0.38)}
.nav-hbg{display:none;flex-direction:column;gap:5px;background:none;border:none;cursor:pointer;padding:6px}
.nav-hbg span{display:block;width:22px;height:2px;background:#fff;border-radius:2px;transition:all .3s}
.nav-hbg.open span:nth-child(1){transform:translateY(7px) rotate(45deg)}
.nav-hbg.open span:nth-child(2){opacity:0;transform:scaleX(0)}
.nav-hbg.open span:nth-child(3){transform:translateY(-7px) rotate(-45deg)}
@media(max-width:900px){.nav-links-c{display:none}.nav-cta-r .btn-ng,.nav-cta-r .btn-go{display:none}.nav-hbg{display:flex}}
.mob-ov{position:fixed;inset:0;background:rgba(0,0,0,0.52);z-index:8998;opacity:0;pointer-events:none;transition:opacity .3s}
.mob-ov.open{opacity:1;pointer-events:all}
.mob-drw{position:fixed;top:0;right:0;bottom:0;width:288px;background:#1a1814;z-index:8999;display:flex;flex-direction:column;padding:22px 18px 32px;box-shadow:-4px 0 40px rgba(0,0,0,0.45);transform:translateX(100%);transition:transform .32s cubic-bezier(.4,0,.2,1)}
.mob-drw.open{transform:translateX(0)}
.mob-drw-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px}
.mob-drw-hd img{height:40px;width:auto}
.mob-cls{background:rgba(255,255,255,0.08);border:none;border-radius:8px;width:34px;height:34px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:rgba(255,255,255,0.7);transition:all .2s}
.mob-cls:hover{background:rgba(255,255,255,0.16);color:#fff}
.mob-lks{display:flex;flex-direction:column;flex:1}
.mob-lks a{display:block;padding:13px 10px;font-size:16px;color:rgba(255,255,255,0.72);border-bottom:1px solid rgba(255,255,255,0.07);text-decoration:none;transition:color .2s}
.mob-lks a:hover{color:#fff}
.mob-acts{display:flex;flex-direction:column;gap:9px;margin-top:22px}
.mob-acts .btn-ng{display:block;text-align:center;padding:12px}
.mob-acts .btn-go{display:block;text-align:center;padding:12px;justify-content:center}
.mob-theme{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);border-radius:10px;padding:12px 14px;font-family:'Outfit',sans-serif;font-size:14px;color:rgba(255,255,255,0.65);cursor:pointer;display:flex;align-items:center;gap:10px;transition:all .2s;width:100%;margin-top:2px}
.mob-theme:hover{background:rgba(255,255,255,0.1);color:#fff}

</style>
